name: Docker Build Dockerfile

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    uses: kube-kaptain/buildon-github-actions/.github/workflows/docker-build-dockerfile.yaml@1.0.86
    permissions:
      contents: write
      packages: write
      checks: write
    with:
      docker-platform: 'linux/amd64,linux/arm64'
      dockerfile-sub-path-linux-amd64: 'src/docker'
      dockerfile-sub-path-linux-arm64: 'src/docker'
      dockerfile-squash: 'no' # FROM scratch - no point.
      qc-block-slash-containing-branches: true
      qc-block-conventional-commits: true
      hook-pre-tagging-tests-script-sub-path: bin/run-tests-all
      hook-pre-docker-prepare-script-sub-path: bin/copy-scripts-for-docker
      github-release-verbatim-files: 'target/kaptain-deploy-scripts.zip'
